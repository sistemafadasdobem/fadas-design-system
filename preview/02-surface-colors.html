<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>preview/02-surface-colors.html</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Lato:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg); padding: 20px; box-sizing: border-box; min-height: 160px; font-family: var(--font-body); }
  .card { background: var(--surface); border: 1px solid var(--border-soft); border-radius: 14px; padding: 20px 22px; box-shadow: var(--shadow-sm); }
  .label-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  .label-row .num { font-family: var(--font-display); font-size: 11px; font-weight: 700; color: var(--gold-deep); letter-spacing: 0.12em; }
  .label-row .title { font-family: var(--font-editorial); font-size: 14px; font-weight: 600; color: var(--text-1); }
  .mono { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
  .meta { font-family: var(--font-body); font-size: 11px; color: var(--text-3); letter-spacing: 0.06em; }
</style>
</head>
<body>
<div class="card">
  <div class="label-row"><span class="num">02</span><span class="title">Superfícies — nunca branco/preto puro</span></div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;">
    <div><div style="height:60px;border-radius:8px;background:#fef4e6;border:1px solid var(--border)"></div><div class="mono" style="margin-top:5px;font-size:10px;text-align:center">--bg</div><div class="mono" style="text-align:center;font-size:9px;color:var(--text-2)">página</div></div><div><div style="height:60px;border-radius:8px;background:#f7ecdb;border:1px solid var(--border)"></div><div class="mono" style="margin-top:5px;font-size:10px;text-align:center">--bg-alt</div><div class="mono" style="text-align:center;font-size:9px;color:var(--text-2)">hover, alt</div></div><div><div style="height:60px;border-radius:8px;background:#ffffff;border:1px solid var(--border)"></div><div class="mono" style="margin-top:5px;font-size:10px;text-align:center">--surface</div><div class="mono" style="text-align:center;font-size:9px;color:var(--text-2)">card sobre cream</div></div><div><div style="height:60px;border-radius:8px;background:#ede0d4;border:1px solid var(--border)"></div><div class="mono" style="margin-top:5px;font-size:10px;text-align:center">--border</div><div class="mono" style="text-align:center;font-size:9px;color:var(--text-2)">padrão</div></div><div><div style="height:60px;border-radius:8px;background:#f5ebe0;border:1px solid var(--border)"></div><div class="mono" style="margin-top:5px;font-size:10px;text-align:center">--border-soft</div><div class="mono" style="text-align:center;font-size:9px;color:var(--text-2)">sutil em card</div></div>
  </div>
</div></body></html>
