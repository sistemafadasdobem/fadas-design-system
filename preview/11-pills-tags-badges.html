<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>preview/11-pills-tags-badges.html</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Lato:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg); padding: 20px; box-sizing: border-box; min-height: 240px; font-family: var(--font-body); }
  .card { background: var(--surface); border: 1px solid var(--border-soft); border-radius: 14px; padding: 20px 22px; box-shadow: var(--shadow-sm); }
  .label-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  .label-row .num { font-family: var(--font-display); font-size: 11px; font-weight: 700; color: var(--gold-deep); letter-spacing: 0.12em; }
  .label-row .title { font-family: var(--font-editorial); font-size: 14px; font-weight: 600; color: var(--text-1); }
  .meta { font-family: var(--font-body); font-size: 11px; color: var(--text-3); letter-spacing: 0.06em; }
  .group-meta { margin-bottom: 8px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.12em; color: var(--text-3); font-size: 10.5px; }

  /* ── Tag #tópico ─────────────────────────────────────── */
  .tag {
    display: inline-flex; align-items: center;
    padding: 8px 12px; border-radius: 6px;
    background: var(--surface); border: 1px solid var(--border);
    font-family: var(--font-body); font-size: 12px; font-weight: 600;
    color: var(--text-2); cursor: pointer;
    transition: border-color var(--transition), color var(--transition),
                background var(--transition), transform .15s ease;
  }
  .tag .hash { color: var(--gold-deep); margin-right: 3px; transition: color var(--transition); }
  /* Hover canônico (existe em blog_post_v1): borda dourada + cor vermelha + lift sutil */
  .tag:hover {
    border-color: var(--gold);
    color: var(--red);
    background: var(--bg-alt);
    transform: translateY(-1px);
  }
  .tag:hover .hash { color: var(--red); }

  /* ── Status badge com pulse ──────────────────────────── */
  .status-badge {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 4px 12px; border-radius: 100px;
    background: var(--surface);
    font-family: var(--font-body); font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em;
  }
  .status-badge.online { border: 1px solid var(--green); color: var(--green-deep); }
  .status-badge.live   { border: 1px solid var(--red);   color: var(--red); }

  .row { display: flex; gap: 10px; flex-wrap: wrap; }
</style>
</head>
<body>
<div class="card">
  <div class="label-row"><span class="num">11</span><span class="title">Pílulas · tags · status <span style="font-family:var(--font-editorial);font-style:italic;font-weight:400;font-size:12px;color:var(--text-3);margin-left:4px">— passe o mouse</span></span></div>
  <div style="display:flex;flex-direction:column;gap:16px;">
    <div>
      <div class="group-meta">Tags #tópico</div>
      <div class="row">
        <span class="tag"><span class="hash">#</span>tarot</span>
        <span class="tag"><span class="hash">#</span>primeira-consulta</span>
        <span class="tag"><span class="hash">#</span>lua-nova</span>
        <span class="tag"><span class="hash">#</span>arcanos</span>
      </div>
    </div>
    <div>
      <div class="group-meta">Status · pulse contínuo</div>
      <div class="row">
        <span class="status-badge online"><span class="status-dot green"></span>8 tarólogas online</span>
        <span class="status-badge live"><span class="status-dot red"></span>Ao vivo</span>
      </div>
    </div>
  </div>
  <div class="meta" style="margin-top:14px;font-family:var(--font-editorial);font-style:italic;color:var(--text-3);font-size:12px">
    Tag hover: borda dourada + texto vermelho + # acende em vermelho. Status: pulse canônico de 2s, única animação contínua do sistema.
  </div>
</div></body></html>
