<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>21 — Brand logos</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg); padding: 20px; min-height: 200px; box-sizing: border-box; font-family: var(--font-body); }
  .card { background: var(--surface); border: 1px solid var(--border-soft); border-radius: 14px; padding: 18px 22px; box-shadow: var(--shadow-sm); }
  .label-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  .label-row .num { font-family: var(--font-display); font-size: 11px; font-weight: 700; color: var(--gold-deep); letter-spacing: 0.12em; }
  .label-row .title { font-family: var(--font-editorial); font-size: 14px; font-weight: 600; color: var(--text-1); }

  .logos-grid { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
  .brand-item {
    display: flex; flex-direction: column; align-items: center; gap: 7px;
    cursor: pointer;
  }
  .brand-icon-wrap {
    width: 46px; height: 46px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    transition: background 0.25s ease, border-color 0.25s ease, border-radius 0.25s ease;
    border: 1.5px solid var(--border);
  }
  .brand-icon-wrap svg { transition: fill 0.25s ease; fill: var(--green-deep); }
  .brand-name {
    font-size: 9.5px; color: var(--text-3);
    font-family: var(--font-editorial); font-style: italic;
  }
  /* per-marca hover — fundo na cor oficial, logo vira branco, raio cresce */
  .brand-item.wa:hover .brand-icon-wrap { background: #25D366; border-color: #25D366; border-radius: 16px; }
  .brand-item.tg:hover .brand-icon-wrap { background: #0088cc; border-color: #0088cc; border-radius: 16px; }
  .brand-item.fb:hover .brand-icon-wrap { background: #1877F2; border-color: #1877F2; border-radius: 16px; }
  .brand-item.x:hover .brand-icon-wrap { background: #000000; border-color: #000000; border-radius: 16px; }
  .brand-item.pt:hover .brand-icon-wrap { background: #E60023; border-color: #E60023; border-radius: 16px; }
  .brand-item.em:hover .brand-icon-wrap { background: #EA4335; border-color: #EA4335; border-radius: 16px; }
  .brand-item.ig:hover .brand-icon-wrap { background-image: linear-gradient(135deg, #FEDA75, #FA7E1E, #D62976, #962FBF, #4F5BD5); border-color: transparent; border-radius: 16px; }
  .brand-item.tk:hover .brand-icon-wrap { background: #000000; border-color: #000000; border-radius: 16px; }
  .brand-item.yt:hover .brand-icon-wrap { background: #FF0000; border-color: #FF0000; border-radius: 16px; }
  .brand-item.px:hover .brand-icon-wrap { background: #32BCAD; border-color: #32BCAD; border-radius: 16px; }
  .brand-item:hover .brand-icon-wrap svg { fill: #ffffff; }
</style>
</head>
