<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>preview/13-card-article.html</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Lato:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg); padding: 20px; box-sizing: border-box; min-height: 340px; font-family: var(--font-body); }
  .card { background: var(--surface); border: 1px solid var(--border-soft); border-radius: 14px; padding: 20px 22px; box-shadow: var(--shadow-sm); }
  .label-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  .label-row .num { font-family: var(--font-display); font-size: 11px; font-weight: 700; color: var(--gold-deep); letter-spacing: 0.12em; }
  .label-row .title { font-family: var(--font-editorial); font-size: 14px; font-weight: 600; color: var(--text-1); }
  .mono { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
  .meta { font-family: var(--font-body); font-size: 11px; color: var(--text-3); letter-spacing: 0.06em; }
</style>
</head>
<body>
<div class="card" style="background:transparent;border:none;box-shadow:none;padding:0">
  <div class="label-row" style="margin-bottom:10px"><span class="num">13</span><span class="title">Card de artigo · descoberta</span></div>
  <article style="background:var(--surface);border:1px solid var(--border-soft);border-radius:20px;overflow:hidden;box-shadow:var(--shadow-sm);max-width:320px;cursor:pointer">
    <div style="aspect-ratio:16/10;background:repeating-linear-gradient(45deg,rgba(229,36,68,0.07),rgba(229,36,68,0.07) 6px,var(--bg-alt) 6px,var(--bg-alt) 12px);display:flex;align-items:center;justify-content:center;position:relative">
      <span style="position:absolute;top:14px;left:14px;display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:#fce4e8;color:#c1185b;border-radius:100px;font-family:var(--font-body);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em"><span style="font-size:9px">✦</span>Amor</span>
      <span style="color:var(--red);font-family:var(--font-body);font-size:10px;font-weight:700;letter-spacing:0.18em">FOTO 16:10</span>
    </div>
    <div style="padding:18px 20px">
      <h3 style="font-family:var(--font-editorial);font-size:17px;font-weight:600;color:var(--text-1);line-height:1.3;margin:0 0 6px">O que o tarot revela sobre relacionamentos em transição</h3>
      <p style="font-family:var(--font-body);font-size:13px;color:var(--text-2);line-height:1.55;margin:0 0 12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">Quando uma relação está em transformação, o tarot ajuda a enxergar o que precisa permanecer.</p>
      <div style="font-family:var(--font-body);font-size:11px;color:var(--text-3);padding-top:12px;border-top:1px solid var(--border-soft)">4 min · 08 mai 2026</div>
    </div>
  </article>
</div></body></html>
