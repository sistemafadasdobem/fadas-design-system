<!DOCTYPE html>

<meta charset="UTF-8">
<title>20 — Phosphor Duotone (local)</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@700&family=Lato:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg); padding: 20px; min-height: 200px; box-sizing: border-box; font-family: var(--font-body); }
  .card { background: var(--surface); border: 1px solid var(--border-soft); border-radius: 14px; padding: 18px 22px; box-shadow: var(--shadow-sm); }
  .label-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  .label-row .num { font-family: var(--font-display); font-size: 11px; font-weight: 700; color: var(--gold-deep); letter-spacing: 0.12em; }
  .label-row .title { font-family: var(--font-editorial); font-size: 14px; font-weight: 600; color: var(--text-1); }

  .icon-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 14px;
  }
  .icon-cell {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer;
    padding: 6px 0;
  }
  .icon-cell span {
    font-family: var(--font-editorial); font-style: italic; font-size: 10.5px; color: var(--text-3);
    transition: color 0.35s ease;
  }
  .icon-cell:hover span { color: var(--gold-deep); }

  .stack { position: relative; width: 36px; height: 36px; }
  .stack > svg { position: absolute; inset: 0; width: 36px; height: 36px; transition: opacity 0.35s ease; }
  .stack > svg.gold { opacity: 0; }
  .icon-cell:hover .stack > svg.rose { opacity: 0; }
  .icon-cell:hover .stack > svg.gold { opacity: 1; }

  /* Apply the Fadas rosé-gold gradient to all stroke+fill nodes inside the rose layer */
  .stack > svg.rose [stroke="currentColor"] { stroke: url(#fadas-rose-stroke); }
  .stack > svg.rose [opacity="0.2"]         { fill:  url(#fadas-rose-fill); opacity: 1; }
  .stack > svg.gold [stroke="currentColor"] { stroke: url(#fadas-gold-stroke); }
  .stack > svg.gold [opacity="0.2"]         { fill:  url(#fadas-gold-fill); opacity: 1; }
</style>
</head>
