<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>preview/17-audio-player.html</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Lato:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg); padding: 20px; box-sizing: border-box; min-height: 180px; font-family: var(--font-body); }
  .card { background: var(--surface); border: 1px solid var(--border-soft); border-radius: 14px; padding: 20px 22px; box-shadow: var(--shadow-sm); }
  .label-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  .label-row .num { font-family: var(--font-display); font-size: 11px; font-weight: 700; color: var(--gold-deep); letter-spacing: 0.12em; }
  .label-row .title { font-family: var(--font-editorial); font-size: 14px; font-weight: 600; color: var(--text-1); }
  .mono { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
  .meta { font-family: var(--font-body); font-size: 11px; color: var(--text-3); letter-spacing: 0.06em; }
</style>
</head>
<body>
<div class="card" style="padding:0">
  <div style="padding:18px 20px 0"><div class="label-row"><span class="num">17</span><span class="title">Player de áudio · "ouvir o artigo"</span></div></div>
  <div style="margin:0 18px 18px;padding:18px 20px;background:linear-gradient(135deg,var(--bg-alt) 0%,var(--surface) 100%);border:1px solid var(--gold-soft);border-radius:16px;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden">
    <div style="position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,var(--gold-soft) 0%,transparent 65%);opacity:0.35;pointer-events:none"></div>
    <button style="position:relative;flex-shrink:0;width:44px;height:44px;border-radius:50%;background:var(--red);border:1.5px solid var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 14px rgba(229,36,68,0.22)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <div style="position:relative;flex:1">
      <div style="font-family:var(--font-body);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:var(--gold-deep);margin-bottom:3px">Ouvir o artigo</div>
      <div style="font-family:var(--font-editorial);font-size:13px;color:var(--text-2);margin-bottom:7px">6:42 ● narrado por IA ● voz feminina</div>
      <div style="height:3px;background:var(--border);border-radius:2px;overflow:hidden"><div style="height:100%;width:35%;background:linear-gradient(90deg,var(--gold-deep),var(--gold));border-radius:2px"></div></div>
    </div>
    <button style="position:relative;flex-shrink:0;font-family:var(--font-body);font-size:11px;font-weight:700;padding:6px 12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text-2);min-width:40px">1x</button>
  </div>
</div></body></html>
