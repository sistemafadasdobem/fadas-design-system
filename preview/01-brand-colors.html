<!DOCTYPE html>

<title>preview/01-brand-colors.html</title>

<style>

  .label-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }

  .label-row .title { font-family: var(--font-editorial); font-size: 14px; font-weight: 600; color: var(--text-1); }
  .mono { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
  .meta { font-family: var(--font-body); font-size: 11px; color: var(--text-3); letter-spacing: 0.06em; }
</style>

adius:8px;background:#c8a840;border:1px solid rgba(0,0,0,0.04)"></div><div class="mono" style="margin-top:5px;font-size:9.5px;text-align:center">--gold-deep</div><div class="mono" style="text-align:center;color:var(--text-2)">#c8a840</div></div><div><div style="height:54px;border-radius:8px;background:#f0dc9a;border:1px solid rgba(0,0,0,0.04)"></div><div class="mono" style="margin-top:5px;font-size:9.5px;text-align:center">--gold-soft</div><div class="mono" style="text-align:center;color:var(--text-2)">#f0dc9a</div></div>
