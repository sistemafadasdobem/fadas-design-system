<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>preview/19-banner-cta.html</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Lato:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg); padding: 20px; box-sizing: border-box; min-height: 280px; font-family: var(--font-body); }
  .card { background: var(--surface); border: 1px solid var(--border-soft); border-radius: 14px; padding: 20px 22px; box-shadow: var(--shadow-sm); }
  .label-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  .label-row .num { font-family: var(--font-display); font-size: 11px; font-weight: 700; color: var(--gold-deep); letter-spacing: 0.12em; }
  .label-row .title { font-family: var(--font-editorial); font-size: 14px; font-weight: 600; color: var(--text-1); }
  .mono { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
  .meta { font-family: var(--font-body); font-size: 11px; color: var(--text-3); letter-spacing: 0.06em; }
</style>
</head>
<body>
<div class="card" style="padding:0;overflow:hidden">
  <div style="padding:16px 20px 0"><div class="label-row" style="margin-bottom:0"><span class="num">19</span><span class="title">Banner CTA · zona de ação</span></div></div>
  <div style="margin:14px 18px 18px;position:relative;padding:36px 24px;background:linear-gradient(135deg,#6a8a30 0%,#4a6b1e 50%,#34501a 100%);color:#fff;text-align:center;border-radius:16px;overflow:hidden">
    <div style="position:absolute;top:-80px;left:5%;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.1) 0%,transparent 65%);pointer-events:none"></div>
    <div style="position:absolute;bottom:-120px;right:0;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(227,204,126,0.15) 0%,transparent 65%);pointer-events:none"></div>
    <div style="position:relative;z-index:2">
      <div style="display:inline-flex;align-items:center;gap:8px;padding:5px 12px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.3);border-radius:100px;font-family:var(--font-body);font-size:9.5px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:0.14em;margin-bottom:14px;backdrop-filter:blur(8px)">
        <span style="width:6px;height:6px;border-radius:50%;background:#fff"></span>Online agora
      </div>
      <div style="font-family:var(--font-display);font-size:24px;font-weight:700;color:#fff;line-height:1.15;letter-spacing:-0.02em;margin-bottom:8px">Sua consulta está esperando</div>
      <div style="font-family:var(--font-editorial);font-style:italic;font-size:13px;color:rgba(255,255,255,0.85);margin-bottom:18px">Tarólogas experientes prontas para te ouvir.</div>
      <button style="font-family:var(--font-body);font-size:12px;font-weight:700;padding:10px 22px;background:#fff;color:var(--green-deep);border:1.5px solid var(--gold);border-radius:100px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,0.15)">Consultar agora →</button>
    </div>
  </div>
</div></body></html>
