<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fadas — Tiragens Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e52444;
    --red-dark: #b81c38;
    --red-deep: #990e22;
    --green: #87c100;
    --green-dark: #6a9900;
    --green-deep: #4a6b1e;
    --gold: #e3cc7e;
    --gold-deep: #c8a840;
    --gold-soft: #f0dc9a;
    --bg: #fdf5ee;
    --bg-dark: #f5e8d8;
    --card: #ffffff;
    --border: #ede0d4;
    --border-light: #f5ebe0;
    --black: #1a1410;
    --muted: #9a8c7e;
    --muted-light: #c0a898;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 375px;
    background: var(--bg);
    font-family: 'Lato', sans-serif;
    color: var(--black);
    margin: 0 auto;
  }

  /* ═══════════════════════════════
     KEYFRAMES
  ═══════════════════════════════ */

  /* entrada da tela */
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* flutuação suave do card ativo */
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-5px); }
  }

  /* brilho do ornamento */
  @keyframes ornamentGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(229,36,68,0); }
    50%       { box-shadow: 0 0 0 8px rgba(229,36,68,0.08); }
  }

  /* ripple do botão */
  @keyframes ripple {
    from { transform: scale(0); opacity: 0.5; }
    to   { transform: scale(3.5); opacity: 0; }
  }

  /* pulse do ✦ do see-all */
  @keyframes starPulse {
    0%, 100% { opacity: 0.6; transform: scale(1) rotate(0deg); }
    50%       { opacity: 1;   transform: scale(1.3) rotate(20deg); }
  }

  /* entrada de cada card em sequência */
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* pulse suave no placeholder da ilustração */
  @keyframes placeholderPulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.6; }
  }

  /* dots elásticos */
  @keyframes dotBounce {
    0%   { transform: scaleY(1); }
    30%  { transform: scaleY(0.6); }
    60%  { transform: scaleY(1.25); }
    80%  { transform: scaleY(0.9); }
    100% { transform: scaleY(1); }
  }

  /* HEADER */
  .header {
    padding: 36px 28px 8px;
    text-align: center;
    position: relative;
    animation: fadeSlideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }
  .header-ornament {
    margin: 0 auto 16px;
    width: 48px;
    height: 48px;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      repeating-linear-gradient(
        45deg,
        rgba(229, 36, 68, 0.08),
        rgba(229, 36, 68, 0.08) 4px,
        var(--bg-dark) 4px,
        var(--bg-dark) 8px
      );
    border: 1.5px dashed rgba(229, 36, 68, 0.35);
    animation: ornamentGlow 3s ease-in-out infinite;
  }
  .header-ornament::after {
    content: '72 × 72';
    color: var(--red);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.08em;
    font-family: 'Lato', sans-serif;
    position: relative;
    z-index: 1;
  }
  .header-ornament img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    z-index: 2;
  }
  .header-ornament img[src]:not([src=""]) { display: block; }
  .header-ornament:has(img[src]:not([src=""])) { background: none; border: none; }
  .header-ornament:has(img[src]:not([src=""]))::after { display: none; }

  .title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 24px;
    font-weight: 700;
    line-height: 1.18;
    color: var(--black);
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .subtitle {
    font-size: 13px;
    color: #6a5c50;
    font-family: 'Lato', sans-serif;
    font-weight: 500;
    letter-spacing: 0.025em;
  }

  .header::before, .header::after {
    content: '✦';
    position: absolute;
    color: var(--gold);
    font-size: 14px;
    opacity: 0.6;
    top: 90px;
    animation: starPulse 3.5s ease-in-out infinite;
  }
  .header::before { left: 24px; animation-delay: 0s; }
  .header::after  { right: 24px; animation-delay: 1.2s; }

  /* CARROSSEL */
  .carousel {
    position: relative;
    margin-top: 8px;
    padding: 18px 0 4px;
  }
  .carousel::before {
    content: '';
    position: absolute;
    top: 14px;
    bottom: 14px;
    left: 0;
    right: 0;
    background: var(--bg-dark);
    opacity: 0.4;
    z-index: 0;
  }

  .track {
    display: flex;
    overflow-x: auto;
    overflow-y: visible;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    gap: 14px;
    padding: 14px 60px 22px;
    scrollbar-width: none;
    position: relative;
    z-index: 1;
    cursor: grab;
    user-select: none;
  }
  .track.dragging { cursor: grabbing; }
  .track::-webkit-scrollbar { display: none; }

  .slot {
    flex: 0 0 240px;
    scroll-snap-align: center;
    scroll-snap-stop: always;
    position: relative;
  }

  /* CARD */
  .card {
    background: var(--card);
    border: 1.5px solid var(--gold-soft);
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(154, 140, 126, 0.08);
    display: flex;
    flex-direction: column;
    min-height: 432px;
    transition: box-shadow 0.35s ease, opacity 0.35s ease, transform 0.35s cubic-bezier(0.2,0.8,0.2,1);
    opacity: 0.72;
    animation: cardIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }
  .slot[data-i="0"] .card { animation-delay: 0.05s; }
  .slot[data-i="1"] .card { animation-delay: 0.15s; }
  .slot[data-i="2"] .card { animation-delay: 0.25s; }
  .slot[data-i="3"] .card { animation-delay: 0.35s; }

  .slot.is-active .card {
    box-shadow:
      0 16px 40px rgba(100, 70, 40, 0.18),
      0 6px 16px rgba(100, 70, 40, 0.10);
    opacity: 1;
    animation: cardIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) both,
               float 4s ease-in-out 0.6s infinite;
  }
  .slot[data-i="0"].is-active .card { animation-delay: 0.05s, 0.6s; }
  .slot[data-i="1"].is-active .card { animation-delay: 0.15s, 0.6s; }
  .slot[data-i="2"].is-active .card { animation-delay: 0.25s, 0.6s; }
  .slot[data-i="3"].is-active .card { animation-delay: 0.35s, 0.6s; }

  /* IMAGEM 1x1 */
  .card-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    position: relative;
    overflow: hidden;
    background:
      repeating-linear-gradient(
        45deg,
        rgba(229, 36, 68, 0.08),
        rgba(229, 36, 68, 0.08) 6px,
        var(--bg-dark) 6px,
        var(--bg-dark) 12px
      );
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: placeholderPulse 2.8s ease-in-out infinite;
  }
  .card-img::after {
    content: 'ILUSTRAÇÃO  ✦  1 : 1';
    white-space: pre;
    text-align: center;
    color: var(--red);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    line-height: 1.6;
    font-family: 'Lato', sans-serif;
  }
  .card-img img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .card-img:has(img[src]:not([src=""])) { background: none; }
  .card-img:has(img[src]:not([src=""]))::after { display: none; }
  .card-img img:not([src]),
  .card-img img[src=""] { display: none; }

  /* CORPO DO CARD */
  .card-body {
    padding: 18px 18px 20px;
    text-align: center;
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 8px;
  }
  .card-name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--black);
    line-height: 1.15;
    letter-spacing: -0.005em;
  }
  .card-desc {
    font-size: 13px;
    color: var(--green-deep);
    font-family: 'Lato', sans-serif;
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: 0.01em;
  }

  .card-divider {
    width: 32px;
    height: 1px;
    background: var(--gold);
    margin: 4px auto;
    position: relative;
  }
  .card-divider::before {
    content: '✦';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--card);
    color: var(--gold-deep);
    font-size: 10px;
    padding: 0 4px;
  }

  /* CTAs */
  .card-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: auto;
  }
  .cta-primary {
    width: 100%;
    padding: 10px 16px;
    border-radius: 100px;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    background: var(--red);
    color: #fef8ec;
    border: 1.5px solid var(--gold);
    transition: background 0.25s ease, transform 0.18s ease, box-shadow 0.25s ease;
    letter-spacing: 0.02em;
    position: relative;
    overflow: hidden;
  }
  .cta-primary::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, rgba(255,255,255,0.35) 0%, transparent 70%);
    transform: scale(0);
    opacity: 0;
    border-radius: inherit;
    transition: none;
  }
  .cta-primary:active::after {
    animation: ripple 0.45s ease-out forwards;
  }
  .cta-primary:hover {
    background: var(--green-dark);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(106, 153, 0, 0.3);
  }
  .cta-primary:active {
    background: var(--green-deep);
    transform: translateY(0);
    box-shadow: none;
  }
  .cta-link {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 11.5px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'Lato', sans-serif;
    transition: color 0.2s ease, letter-spacing 0.2s ease;
  }
  .cta-link:hover {
    color: var(--red);
    letter-spacing: 0.12em;
  }

  /* BOLINHAS */
  .dots {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    padding: 16px 0 4px;
    position: relative;
    z-index: 1;
  }
  .dots button {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--gold-soft);
    border: none;
    cursor: pointer;
    padding: 0;
    transition: background 0.35s ease, width 0.35s cubic-bezier(0.2,0.8,0.2,1);
    transform-origin: center bottom;
  }
  .dots button.active {
    background: var(--gold-deep);
    width: 22px;
    border-radius: 4px;
    animation: dotBounce 0.45s cubic-bezier(0.2,0.8,0.2,1);
  }

  /* VER TODAS */
  .see-all {
    margin: 24px 28px 32px;
    display: flex;
    justify-content: center;
    animation: fadeSlideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) 0.4s both;
  }
  .see-all-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 24px;
    background: var(--card);
    border: 1.5px solid var(--gold);
    color: var(--black);
    border-radius: 100px;
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
  }
  .see-all-btn::before,
  .see-all-btn::after {
    content: '✦';
    color: var(--gold-deep);
    font-size: 10px;
    display: inline-block;
    animation: starPulse 3s ease-in-out infinite;
  }
  .see-all-btn::after { animation-delay: 1.5s; }
  .see-all-btn:hover {
    background: var(--gold-soft);
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(200, 168, 64, 0.22);
  }
</style>
</head>
<body>

    <div class="header">
      <div class="header-ornament">
        <img src="" alt="Ornamento topo" data-asset="tiragens-ornamento">
      </div>
      <h2 class="title">Qual tiragem responde<br>melhor sua pergunta?</h2>
      <p class="subtitle">Escolha a opção ideal para o seu momento</p>
    </div>

    <div class="carousel">
      <div class="track" id="track">

        <div class="slot" data-i="0">
          <div class="card">
            <div class="card-img"><img src="" alt="Cruz Celta" data-asset="cruz-celta"></div>
            <div class="card-body">
              <div class="card-name">Cruz Celta</div>
              <div class="card-divider"></div>
              <div class="card-desc">Questão em profundidade</div>
              <div class="card-actions">
                <button class="cta-primary">Escolher leitura</button>
                <button class="cta-link">Ver detalhes →</button>
              </div>
            </div>
          </div>
        </div>

        <div class="slot" data-i="1">
          <div class="card">
            <div class="card-img"><img src="" alt="Jogo do Relacionamento" data-asset="jogo-relacionamento"></div>
            <div class="card-body">
              <div class="card-name">Jogo do<br>Relacionamento</div>
              <div class="card-divider"></div>
              <div class="card-desc">Sentimentos e futuro</div>
              <div class="card-actions">
                <button class="cta-primary">Escolher leitura</button>
                <button class="cta-link">Ver detalhes →</button>
              </div>
            </div>
          </div>
        </div>

        <div class="slot" data-i="2">
          <div class="card">
            <div class="card-img"><img src="" alt="Mesa Real" data-asset="mesa-real"></div>
            <div class="card-body">
              <div class="card-name">Mesa Real</div>
              <div class="card-divider"></div>
              <div class="card-desc">36 cartas, visão geral</div>
              <div class="card-actions">
                <button class="cta-primary">Escolher leitura</button>
                <button class="cta-link">Ver detalhes →</button>
              </div>
            </div>
          </div>
        </div>

        <div class="slot" data-i="3">
          <div class="card">
            <div class="card-img"><img src="" alt="Mandala Astrológica" data-asset="mandala-astrologica"></div>
            <div class="card-body">
              <div class="card-name">Mandala<br>Astrológica</div>
              <div class="card-divider"></div>
              <div class="card-desc">12 áreas da vida</div>
              <div class="card-actions">
                <button class="cta-primary">Escolher leitura</button>
                <button class="cta-link">Ver detalhes →</button>
              </div>
            </div>
          </div>
        </div>

      </div>

      <div class="dots" id="dots">
        <button data-i="0"></button>
        <button data-i="1" class="active"></button>
        <button data-i="2"></button>
        <button data-i="3"></button>
      </div>
    </div>

    <div class="see-all">
      <button class="see-all-btn">Ver todas as tiragens →</button>
    </div>

<script>
(function(){
  const track = document.getElementById('track');
  const dots = document.querySelectorAll('#dots button');
  const slots = document.querySelectorAll('.slot');
  if(!track || !dots.length) return;

  function setActive(i){
    dots.forEach((d, idx) => d.classList.toggle('active', idx === i));
    slots.forEach((s, idx) => s.classList.toggle('is-active', idx === i));
  }
  function centerCard(i){
    const target = slots[i];
    const offset = target.offsetLeft - (track.clientWidth - target.offsetWidth) / 2;
    track.scrollTo({ left: offset, behavior: 'smooth' });
  }

  dots.forEach(dot => {
    dot.addEventListener('click', () => centerCard(parseInt(dot.dataset.i, 10)));
  });

  let raf = null;
  track.addEventListener('scroll', () => {
    if (raf) return;
    raf = requestAnimationFrame(() => {
      const trackCenter = track.scrollLeft + track.clientWidth / 2;
      let bestI = 0, bestDist = Infinity;
      slots.forEach((s, i) => {
        const sCenter = s.offsetLeft + s.offsetWidth / 2;
        const dist = Math.abs(sCenter - trackCenter);
        if (dist < bestDist) { bestDist = dist; bestI = i; }
      });
      setActive(bestI);
      raf = null;
    });
  });

  requestAnimationFrame(() => {
    const target = slots[1];
    track.scrollLeft = target.offsetLeft - (track.clientWidth - target.offsetWidth) / 2;
    setActive(1);
  });

  let isDown = false, startX = 0, startScroll = 0, moved = 0;
  track.addEventListener('mousedown', (e) => {
    isDown = true; moved = 0;
    track.classList.add('dragging');
    startX = e.pageX; startScroll = track.scrollLeft;
    e.preventDefault();
  });
  window.addEventListener('mouseup', () => {
    if (!isDown) return;
    isDown = false;
    track.classList.remove('dragging');
    if (moved > 5) {
      const trackCenter = track.scrollLeft + track.clientWidth / 2;
      let bestI = 0, bestDist = Infinity;
      slots.forEach((s, i) => {
        const sCenter = s.offsetLeft + s.offsetWidth / 2;
        const dist = Math.abs(sCenter - trackCenter);
        if (dist < bestDist) { bestDist = dist; bestI = i; }
      });
      centerCard(bestI);
    }
  });
  window.addEventListener('mousemove', (e) => {
    if (!isDown) return;
    e.preventDefault();
    const walk = e.pageX - startX;
    moved = Math.abs(walk);
    track.scrollLeft = startScroll - walk;
  });
  track.addEventListener('click', (e) => {
    if (moved > 5) { e.stopPropagation(); e.preventDefault(); }
  }, true);
})();
</script>

</body>
</html>
